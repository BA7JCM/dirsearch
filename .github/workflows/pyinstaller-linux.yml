name: PyInstaller Linux

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag used in artifact names
        required: false
        default: v0.5.0-rc1
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string
        default: v0.5.0-rc1

env:
  PYTHON_VERSION: '3.14'
  PYINSTALLER_VERSION: '6.20.0'
  RELEASE_TAG: ${{ inputs.release_tag || 'v0.5.0-rc1' }}

jobs:
  build-linux:
    name: Build Linux ${{ matrix.target.arch }} (${{ matrix.stack.name }})
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target:
          - arch: x64
            runner: ubuntu-latest
            suffix: linux-x64
          - arch: arm64
            runner: ubuntu-24.04-arm
            suffix: linux-arm64
        stack:
          - name: threaded
          - name: async
          - name: native-rust

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install native build dependencies
        if: matrix.stack.name == 'native-rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --only-binary=:all: -r requirements.txt -r requirements/db.txt
          python -m pip install pyinstaller==${{ env.PYINSTALLER_VERSION }}

      - name: Configure default stack
        run: python scripts/configure_stack.py config.ini ${{ matrix.stack.name }}

      - name: Build native Rust extension
        if: matrix.stack.name == 'native-rust'
        run: |
          rustup default stable
          python -m pip install --only-binary=:all: maturin
          mkdir -p dist/native-wheels
          python -m maturin build --release --manifest-path native/Cargo.toml --out dist/native-wheels
          python -m pip install dist/native-wheels/*.whl
          python -c "import dirsearch_native"

      - name: Build Linux binary
        run: python -m PyInstaller --clean pyinstaller/dirsearch.spec

      - name: Rename binary
        run: |
          mv dist/dirsearch "dist/dirsearch-${RELEASE_TAG}-${{ matrix.target.suffix }}-${{ matrix.stack.name }}"

      - name: Test Linux binary
        run: |
          "./dist/dirsearch-${RELEASE_TAG}-${{ matrix.target.suffix }}-${{ matrix.stack.name }}" --version
          "./dist/dirsearch-${RELEASE_TAG}-${{ matrix.target.suffix }}-${{ matrix.stack.name }}" --help
          "./dist/dirsearch-${RELEASE_TAG}-${{ matrix.target.suffix }}-${{ matrix.stack.name }}" -u https://example.com -w tests/static/wordlist.txt -e html -q

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: dirsearch-${{ env.RELEASE_TAG }}-${{ matrix.target.suffix }}-${{ matrix.stack.name }}
          path: dist/dirsearch-${{ env.RELEASE_TAG }}-${{ matrix.target.suffix }}-${{ matrix.stack.name }}
          retention-days: 30
